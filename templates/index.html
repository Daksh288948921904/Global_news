<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Global News · Published Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/style.css?v={{ static_v }}"/>
</head>
<body>

<!-- Ambient gradient backdrop -->
<div class="ambient-bg" aria-hidden="true">
  <div class="amb-blob amb-1"></div>
  <div class="amb-blob amb-2"></div>
  <div class="amb-blob amb-3"></div>
</div>

<div class="app">

  <!-- ░░ SIDEBAR ░░ -->
  <div class="sidebar-backdrop" id="sb-backdrop"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-letters">GN</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">Global News</span>
          <span class="brand-tagline">Published Feed</span>
        </div>
      </div>
      <button class="sidebar-close-btn" id="sidebar-close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M4 4l8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section-label sbn-label">
      <span class="sbn-live-dot"></span>Breaking News
    </div>
    <div class="sidebar-bn" id="sidebar-bn">
      <!-- Lead story card -->
      <div class="sbn-lead-wrap hidden" id="sbn-lead"></div>
      <!-- 3 rotating feed stories -->
      <div class="sbn-stories" id="sbn-stories"></div>
      <!-- Page dots -->
      <div class="sbn-dots" id="sbn-dots"></div>
    </div>

    <div class="sidebar-bottom">
      <div class="live-status">
        <span class="pulse-ring"></span>
        <span class="live-text">Published feed</span>
      </div>
      <div class="stats-grid">
        <div class="stat-cell">
          <span class="stat-n" id="s-articles">—</span>
          <span class="stat-l">Articles</span>
        </div>
        <div class="stat-cell">
          <span class="stat-n" id="s-updated">—</span>
          <span class="stat-l">Updated</span>
        </div>
      </div>
      <button class="fetch-btn" id="btn-refresh">
        <svg class="fetch-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="refresh-label">Refresh Feed</span>
        <span class="fetch-spinner hidden" id="refresh-spinner"></span>
      </button>
    </div>
  </nav>

  <!-- ░░ MAIN PANEL ░░ -->
  <div class="main" id="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-brand-mobile">Global News</div>

      <div class="search-box">
        <svg class="search-ico" width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 10.5l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <input id="search" type="text" placeholder="Search stories…" autocomplete="off" spellcheck="false"/>
        <kbd>⌘K</kbd>
      </div>

      <div class="topbar-right">
        <div class="sort-wrap">
          <label class="sort-label">Sort</label>
          <select id="sort" class="sort-sel">
            <option value="new">Latest</option>
            <option value="old">Oldest</option>
            <option value="long">Longest</option>
          </select>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="vb-grid" title="Grid view">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><rect x="0" y="0" width="5.5" height="5.5" rx="1"/><rect x="7.5" y="0" width="5.5" height="5.5" rx="1"/><rect x="0" y="7.5" width="5.5" height="5.5" rx="1"/><rect x="7.5" y="7.5" width="5.5" height="5.5" rx="1"/></svg>
          </button>
          <button class="view-btn" id="vb-list" title="List view">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="0" y="0" width="13" height="3" rx="1" fill="currentColor"/><rect x="0" y="5" width="13" height="3" rx="1" fill="currentColor"/><rect x="0" y="10" width="13" height="3" rx="1" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="topbar-sep"></div>
        <div class="topbar-clock" id="topbar-clock"></div>
        <div class="topbar-user" title="Global News · Public Feed">
          <div class="topbar-user-avatar">GN</div>
        </div>
      </div>
    </header>

    <!-- Category bar (moved from sidebar) -->
    <div class="cat-bar" id="cat-bar">
      <button class="catb active" data-cat="all">
        <svg class="catb-icon" width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><rect x="0" y="0" width="4.5" height="4.5" rx="1"/><rect x="6.5" y="0" width="4.5" height="4.5" rx="1"/><rect x="0" y="6.5" width="4.5" height="4.5" rx="1"/><rect x="6.5" y="6.5" width="4.5" height="4.5" rx="1"/></svg>
        All<span class="catb-count" id="cnt-all">0</span>
      </button>
      <button class="catb" data-cat="world">🌐 World<span class="catb-count" id="cnt-world">0</span></button>
      <button class="catb" data-cat="politics">🏛 Politics<span class="catb-count" id="cnt-politics">0</span></button>
      <button class="catb" data-cat="technology">⚡ Tech<span class="catb-count" id="cnt-technology">0</span></button>
      <button class="catb" data-cat="business">📈 Business<span class="catb-count" id="cnt-business">0</span></button>
      <button class="catb" data-cat="health">🩺 Health<span class="catb-count" id="cnt-health">0</span></button>
      <button class="catb" data-cat="science">🔬 Science<span class="catb-count" id="cnt-science">0</span></button>
      <button class="catb" data-cat="sports">🏆 Sports<span class="catb-count" id="cnt-sports">0</span></button>
    </div>

    <!-- Feed area -->
    <div class="feed-area" id="feed-area">

      <!-- Feed header strip -->
      <div class="feed-header" id="feed-header">
        <div class="feed-header-left">
          <span class="feed-header-title" id="feed-header-title">All Stories</span>
          <span class="feed-header-count" id="feed-header-count"></span>
        </div>
        <div class="feed-header-right">
          <span class="feed-header-date" id="feed-header-date"></span>
        </div>
      </div>

      <!-- Lead Story Hero (hidden until a lead story is set) -->
      <div class="lead-story-hero hidden" id="lead-story-hero">
        <div class="lsh-badge-row">
          <span class="lsh-label">★ Lead Story</span>
          <div class="lsh-category" id="lsh-category"></div>
        </div>
        <div class="lsh-layout">
          <div class="lsh-text">
            <h2 class="lsh-title" id="lsh-title"></h2>
            <p class="lsh-subtitle" id="lsh-subtitle"></p>
            <div class="lsh-meta" id="lsh-meta"></div>
            <button class="lsh-read-btn" id="lsh-read-btn">Read Full Story →</button>
          </div>
          <div class="lsh-image" id="lsh-image"></div>
        </div>
      </div>

      <!-- Skeleton (shown while loading) -->
      <div class="skeleton-grid" id="skeleton" style="display:none">
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w90"></div><div class="skel-line w50"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w90"></div><div class="skel-line w50"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w90"></div><div class="skel-line w50"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w90"></div><div class="skel-line w50"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w90"></div><div class="skel-line w50"></div></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-body"><div class="skel-line w80"></div><div class="skel-line w60"></div><div class="skel-line w90"></div><div class="skel-line w50"></div></div></div>
      </div>

      <!-- Empty state -->
      <div class="empty" id="empty">
        <div class="empty-orb"></div>
        <h2 class="empty-h">No articles yet</h2>
        <p class="empty-p">Published stories from Global News will appear here.</p>
        <button class="cta-btn" onclick="document.getElementById('btn-refresh').click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Refresh Feed
        </button>
      </div>

      <!-- Grid -->
      <div class="grid" id="grid"></div>
      <!-- List -->
      <div class="list-view hidden" id="list-view"></div>

    </div>
  </div>
</div>

<!-- ░░ READER OVERLAY ░░ -->
<div class="reader-overlay" id="reader-overlay">
  <div class="reader-bg" id="reader-bg" onclick="closeReader()"></div>
  <div class="reader-panel" id="reader-panel">

    <div class="reader-header">
      <button class="reader-close" onclick="closeReader()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M14 4L4 14M4 4l10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="reader-header-meta" id="rh-meta"></div>
      <a class="reader-ext-link" id="reader-ext" href="#" target="_blank" rel="noopener" style="display:none">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M7.5 1H12M12 1v4.5M12 1L6 7M1 6v6h6V8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Source
      </a>
    </div>

    <div class="reader-scroll" id="reader-scroll">
      <div class="reader-progress-bar"><div class="reader-progress-fill" id="reader-prog"></div></div>

      <div class="reader-content">
        <div class="reader-cat-pill" id="r-cat"></div>
        <h1 class="reader-title" id="r-title" spellcheck="false"></h1>
        <p class="reader-deck" id="r-deck"></p>
        <div class="reader-byline" id="r-byline"></div>
        <div class="reader-image" id="r-image"></div>
        <div class="reader-body" id="r-body"></div>
      </div>

      <!-- News Verification -->
      <section class="reader-section news-check-outer" id="news-check-outer">
        <div class="reader-section-label">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1L8.2 4.4l3.8.55-2.75 2.68.65 3.79L6.5 9.7l-3.4 1.78.65-3.79L1 5.0l3.8-.55L6.5 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" fill="none"/></svg>
          News Verification
        </div>
        <div id="news-check-section">
          <div class="nc-idle">
            <button class="nc-run-btn" onclick="runNewsCheck()">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M4.5 3.5l4 2.5-4 2.5V3.5z" fill="currentColor"/></svg>
              Run Verification
            </button>
          </div>
        </div>
      </section>

      <div class="reader-footer">
        <button class="reader-json-btn" onclick="toggleRawJson()">{ } Raw JSON</button>
        <pre class="reader-raw hidden" id="reader-raw"></pre>
      </div>
    </div>
  </div>
</div>

<!-- ░░ TOAST ░░ -->
<div class="toast-stack" id="toast-stack"></div>

<script src="/static/js/app.js?v={{ static_v }}"></script>
</body>
</html>
